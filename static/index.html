<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Traffic Density Comparator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0f1117;
      color: #e1e4ea;
      min-height: 100vh;
      padding: 24px;
    }
    h2 {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
    }
    .card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: #3a3d4a; }
    .card h3 {
      font-size: 1rem;
      font-weight: 600;
      color: #a0a6b8;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.75rem;
    }
    .card h4 {
      font-size: 0.85rem;
      color: #8890a4;
      margin-bottom: 8px;
    }
    .row { display: flex; gap: 16px; flex-wrap: wrap; }
    .row > * { flex: 1; min-width: 300px; }

    /* Form inputs */
    input[type="file"] {
      background: #252836;
      border: 1px solid #3a3d4a;
      border-radius: 8px;
      padding: 8px 12px;
      color: #e1e4ea;
      font-size: 0.85rem;
      cursor: pointer;
    }
    input[type="text"], input[type="number"] {
      background: #252836;
      border: 1px solid #3a3d4a;
      border-radius: 8px;
      padding: 8px 12px;
      color: #e1e4ea;
      font-size: 0.85rem;
      width: 100%;
      max-width: 360px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus, input[type="number"]:focus {
      border-color: #60a5fa;
    }
    label {
      font-size: 0.85rem;
      color: #8890a4;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    /* Buttons */
    .btn {
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.98); }
    .btn-sm { padding: 6px 14px; font-size: 0.8rem; }
    .btn-outline {
      background: transparent;
      border: 1px solid #3b82f6;
      color: #60a5fa;
    }
    .btn-outline:hover { background: rgba(59,130,246,0.1); }
    .btn-success {
      background: linear-gradient(135deg, #22c55e, #16a34a);
    }

    /* Canvas */
    canvas {
      border: 1px solid #3a3d4a;
      border-radius: 8px;
      cursor: crosshair;
      display: block;
      max-width: 100%;
    }

    /* Status */
    #status {
      margin-top: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      color: #60a5fa;
    }

    /* Signal lights */
    .signal-row {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-top: 8px;
    }
    .signal-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .light {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #333;
      border: 2px solid #555;
      box-shadow: 0 0 8px rgba(0,0,0,0.4);
      transition: background 0.3s, box-shadow 0.3s;
    }
    .light.red { background: #ef4444; box-shadow: 0 0 16px rgba(239,68,68,0.5); }
    .light.green { background: #22c55e; box-shadow: 0 0 16px rgba(34,197,94,0.5); }

    /* Summary stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }
    .stat-box {
      background: #252836;
      border-radius: 10px;
      padding: 14px;
      text-align: center;
    }
    .stat-box .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #60a5fa;
    }
    .stat-box .stat-label {
      font-size: 0.7rem;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 4px;
    }
    .stat-box.v2 .stat-value { color: #a78bfa; }
    .stat-box.verdict .stat-value { color: #fbbf24; font-size: 1.1rem; }

    /* Chart */
    #chartCanvas {
      width: 100%;
      height: 260px;
      cursor: default;
      border: none;
    }

    /* Data table */
    .table-wrap {
      max-height: 360px;
      overflow-y: auto;
      border-radius: 8px;
      border: 1px solid #2a2d3a;
    }
    .table-wrap::-webkit-scrollbar { width: 6px; }
    .table-wrap::-webkit-scrollbar-track { background: #1a1d27; }
    .table-wrap::-webkit-scrollbar-thumb { background: #3a3d4a; border-radius: 3px; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }
    thead { position: sticky; top: 0; z-index: 1; }
    th {
      background: #252836;
      color: #8890a4;
      padding: 10px 12px;
      text-align: left;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      border-bottom: 1px solid #2a2d3a;
    }
    td {
      padding: 8px 12px;
      border-bottom: 1px solid #1e2030;
      color: #c8ccd6;
    }
    tr:hover td { background: #1e2030; }
    .sig-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.75rem;
    }
    .sig-badge.red { background: rgba(239,68,68,0.15); color: #f87171; }
    .sig-badge.green { background: rgba(34,197,94,0.15); color: #4ade80; }

    /* Playback controls */
    .playback-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .playback-controls select {
      background: #252836;
      border: 1px solid #3a3d4a;
      border-radius: 6px;
      color: #e1e4ea;
      padding: 4px 8px;
      font-size: 0.8rem;
    }
    .playback-progress {
      flex: 1;
      min-width: 120px;
      height: 6px;
      background: #252836;
      border-radius: 3px;
      overflow: hidden;
    }
    .playback-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #6366f1);
      width: 0%;
      transition: width 0.15s linear;
      border-radius: 3px;
    }
    .playback-time { font-size: 0.8rem; color: #6b7280; min-width: 80px; }

    /* Download link */
    .download-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #60a5fa;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    .download-link:hover { color: #93c5fd; }

    /* Results section hidden by default */
    .results-section { display: none; }
    .results-section.visible { display: block; }

    /* Fade-in animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.4s ease-out; }
  </style>
</head>
<body>
  <h2>🚦 Traffic Density Comparator</h2>

  <!-- Upload Section -->
  <div class="card">
    <h3>📁 Upload Videos</h3>
    <div class="row" style="gap:12px; align-items:flex-end;">
      <div>
        <label>Video 1</label><br>
        <input type="file" id="video1" accept="video/*">
      </div>
      <div>
        <label>Video 2</label><br>
        <input type="file" id="video2" accept="video/*">
      </div>
      <div>
        <button class="btn" id="btnUpload">Upload</button>
      </div>
    </div>
    <div style="margin-top:10px;">
      <label>Model path
        <input type="text" id="modelPath" value="models/vehicle_best.pt">
      </label>
    </div>
  </div>

  <!-- ROI Drawing -->
  <div class="row">
    <div class="card">
      <h3>🎯 Video 1 ROI</h3>
      <canvas id="c1" width="520" height="300"></canvas>
      <div style="margin-top:8px; display:flex; align-items:center; gap:12px;">
        <button class="btn btn-sm btn-outline" onclick="undo(1)">Undo</button>
        <span id="count1" style="font-size:0.8rem; color:#6b7280;">Points: 0</span>
      </div>
    </div>
    <div class="card">
      <h3>🎯 Video 2 ROI</h3>
      <canvas id="c2" width="520" height="300"></canvas>
      <div style="margin-top:8px; display:flex; align-items:center; gap:12px;">
        <button class="btn btn-sm btn-outline" onclick="undo(2)">Undo</button>
        <span id="count2" style="font-size:0.8rem; color:#6b7280;">Points: 0</span>
      </div>
    </div>
  </div>

  <!-- Run -->
  <div class="card">
    <div style="display:flex; align-items:center; gap:16px;">
      <button class="btn btn-success" id="btnRun">▶ Run Compare</button>
      <div id="status">Idle</div>
    </div>
  </div>

  <!-- ========== RESULTS SECTION ========== -->
  <div id="resultsSection" class="results-section">

    <!-- Signal Lights + Playback -->
    <div class="card fade-in">
      <h3>🚥 Live Signal Playback</h3>
      <div class="signal-row">
        <div class="signal-item">
          <div id="l1" class="light"></div>
          <span style="font-weight:600;">Video 1</span>
        </div>
        <div class="signal-item">
          <div id="l2" class="light"></div>
          <span style="font-weight:600;">Video 2</span>
        </div>
        <div id="meta" style="font-size:0.85rem; color:#6b7280;"></div>
      </div>
      <div class="playback-controls">
        <button class="btn btn-sm btn-outline" id="btnPlayPause">⏸ Pause</button>
        <label style="gap:4px;">Speed
          <select id="playbackSpeed">
            <option value="400">0.5×</option>
            <option value="200" selected>1×</option>
            <option value="100">2×</option>
            <option value="50">4×</option>
          </select>
        </label>
        <div class="playback-progress">
          <div class="playback-progress-bar" id="progressBar"></div>
        </div>
        <div class="playback-time" id="playbackTime">0 / 0</div>
      </div>
    </div>

    <!-- Summary Stats -->
    <div class="card fade-in">
      <h3>📊 Summary Statistics</h3>
      <div class="stats-grid" id="statsGrid"></div>
    </div>

    <!-- Density Chart -->
    <div class="card fade-in">
      <h3>📈 Density Over Time</h3>
      <canvas id="chartCanvas"></canvas>
    </div>

    <!-- Data Table -->
    <div class="card fade-in">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
        <h3 style="margin-bottom:0;">📋 Full Data Table</h3>
        <a id="csvLink" class="download-link" href="#" download>⬇ Download CSV</a>
      </div>
      <div class="table-wrap">
        <table id="dataTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Time (s)</th>
              <th>Density 1</th>
              <th>Density 2</th>
              <th>Signal 1</th>
              <th>Signal 2</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div id="tableInfo" style="margin-top:8px; font-size:0.75rem; color:#6b7280;"></div>
    </div>
  </div>

  <script>
    let jobId = null;
    let roi1 = [], roi2 = [];
    let timeline = [];
    let csvUrl = "";

    // Playback state
    let playTimer = null;
    let playIndex = 0;
    let isPlaying = false;

    const c1 = document.getElementById("c1"), ctx1 = c1.getContext("2d");
    const c2 = document.getElementById("c2"), ctx2 = c2.getContext("2d");
    const img1 = new Image(), img2 = new Image();
    const s1 = { sx: 1, sy: 1 }, s2 = { sx: 1, sy: 1 };

    /* ── ROI drawing ── */
    function draw(ctx, canvas, img, pts) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (img.src) ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      if (!pts.length) return;

      ctx.save();
      ctx.strokeStyle = "cyan";
      ctx.lineWidth = 2;
      ctx.beginPath();
      pts.forEach((p, i) => {
        if (i === 0) ctx.moveTo(p[0], p[1]); else ctx.lineTo(p[0], p[1]);
      });
      if (pts.length >= 3) ctx.closePath();
      ctx.stroke();
      ctx.restore();

      pts.forEach((p) => {
        ctx.save();
        ctx.fillStyle = "#ff0";
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(p[0], p[1], 6, 0, 2 * Math.PI);
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      });
    }

    function redrawAll() {
      draw(ctx1, c1, img1, roi1);
      draw(ctx2, c2, img2, roi2);
      document.getElementById("count1").innerText = `Points: ${roi1.length}`;
      document.getElementById("count2").innerText = `Points: ${roi2.length}`;
    }

    function addPointFromEvent(canvas, pts, scale, clientX, clientY) {
      const r = canvas.getBoundingClientRect();
      pts.push([Math.round(clientX - r.left), Math.round(clientY - r.top)]);
      redrawAll();
      document.getElementById("status").innerText = "ROI point added.";
    }

    function attachClick(canvas, pts, scale) {
      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        addPointFromEvent(canvas, pts, scale, e.clientX, e.clientY);
      });
    }

    function undo(which) {
      if (which === 1 && roi1.length) roi1.pop();
      if (which === 2 && roi2.length) roi2.pop();
      redrawAll();
    }

    attachClick(c1, roi1, s1);
    attachClick(c2, roi2, s2);

    /* ── Upload ── */
    document.getElementById("btnUpload").onclick = async () => {
      const v1 = document.getElementById("video1").files[0];
      const v2 = document.getElementById("video2").files[0];
      if (!v1 || !v2) return alert("Select both videos.");

      const fd = new FormData();
      fd.append("video1", v1);
      fd.append("video2", v2);

      document.getElementById("status").innerText = "Uploading...";
      const res = await fetch("/api/upload", { method: "POST", body: fd });
      const data = await res.json();
      if (!res.ok) return alert(data.detail || "Upload failed");

      jobId = data.job_id;
      roi1.length = 0;
      roi2.length = 0;

      // Hide results from previous run
      document.getElementById("resultsSection").classList.remove("visible");

      img1.onload = () => {
        s1.sx = data.frame1_size[0] / c1.width;
        s1.sy = data.frame1_size[1] / c1.height;
        redrawAll();
      };
      img2.onload = () => {
        s2.sx = data.frame2_size[0] / c2.width;
        s2.sy = data.frame2_size[1] / c2.height;
        redrawAll();
      };

      img1.src = data.frame1_url + "?t=" + Date.now();
      img2.src = data.frame2_url + "?t=" + Date.now();
      document.getElementById("status").innerText = "Uploaded. Draw ROI on both frames, then click Run.";
    };

    /* ── Run ── */
    document.getElementById("btnRun").onclick = async () => {
      if (!jobId) return alert("Upload videos first.");
      if (roi1.length < 3 || roi2.length < 3) return alert("Draw at least 3 ROI points on each video.");

      function scaleUp(pts, scale) {
        return pts.map(([x, y]) => [Math.round(x * scale.sx), Math.round(y * scale.sy)]);
      }

      const payload = {
        roi1: scaleUp(roi1, s1),
        roi2: scaleUp(roi2, s2),
        model_path: document.getElementById("modelPath").value,
        segment_m: 120, lanes1: 1, lanes2: 1,
        conf: 0.15, imgsz: 640, smooth: 30
      };

      const res = await fetch(`/api/run/${jobId}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const data = await res.json();
      if (!res.ok) return alert(data.detail || "Run failed");

      document.getElementById("status").innerText = "Running... please wait.";
      pollStatus();
    };

    /* ── Poll ── */
    async function pollStatus() {
      const timer = setInterval(async () => {
        try {
          const res = await fetch(`/api/status/${jobId}`);
          const s = await res.json();

          if (!res.ok) {
            clearInterval(timer);
            document.getElementById("status").innerText = `Status: Error — ${s.detail || "Server error"}`;
            return;
          }

          document.getElementById("status").innerText =
            `Status: ${s.status}` + (s.message ? ` — ${s.message}` : "");

          if (s.status === "done") {
            clearInterval(timer);
            const rr = await fetch(`/api/result/${jobId}`);
            const result = await rr.json();
            timeline = result.timeline || [];
            csvUrl = result.csv_url || "";
            showResults();
          }
          if (s.status === "error") {
            clearInterval(timer);
          }
        } catch (err) {
          clearInterval(timer);
          document.getElementById("status").innerText = `Status: Error — Connection failed`;
        }
      }, 2000);
    }

    /* ── Show results ── */
    function showResults() {
      document.getElementById("resultsSection").classList.add("visible");
      document.getElementById("status").innerText = "✅ Done! Results below.";

      // CSV link
      if (csvUrl) {
        const link = document.getElementById("csvLink");
        link.href = csvUrl;
        link.style.display = "inline-flex";
      }

      buildSummary();
      buildTable();
      drawChart();
      startPlayback();
    }

    /* ── Summary stats ── */
    function buildSummary() {
      if (!timeline.length) return;

      const d1 = timeline.map(r => r.density_1);
      const d2 = timeline.map(r => r.density_2);

      const avg = arr => arr.reduce((a, b) => a + b, 0) / arr.length;
      const max = arr => Math.max(...arr);
      const min = arr => Math.min(...arr);

      const avgD1 = avg(d1), avgD2 = avg(d2);
      const redCount1 = timeline.filter(r => r.signal_1 === "RED").length;
      const redCount2 = timeline.filter(r => r.signal_2 === "RED").length;
      const totalFrames = timeline.length;
      const duration = timeline[timeline.length - 1].time_sec;

      let verdict = "Balanced";
      if (avgD1 > avgD2 * 1.1) verdict = "Video 1 more congested";
      else if (avgD2 > avgD1 * 1.1) verdict = "Video 2 more congested";

      const html = `
        <div class="stat-box">
          <div class="stat-value">${avgD1.toFixed(1)}</div>
          <div class="stat-label">Avg Density V1</div>
        </div>
        <div class="stat-box v2">
          <div class="stat-value">${avgD2.toFixed(1)}</div>
          <div class="stat-label">Avg Density V2</div>
        </div>
        <div class="stat-box">
          <div class="stat-value">${max(d1).toFixed(1)}</div>
          <div class="stat-label">Peak Density V1</div>
        </div>
        <div class="stat-box v2">
          <div class="stat-value">${max(d2).toFixed(1)}</div>
          <div class="stat-label">Peak Density V2</div>
        </div>
        <div class="stat-box">
          <div class="stat-value">${redCount1}</div>
          <div class="stat-label">Red Signals V1</div>
        </div>
        <div class="stat-box v2">
          <div class="stat-value">${redCount2}</div>
          <div class="stat-label">Red Signals V2</div>
        </div>
        <div class="stat-box">
          <div class="stat-value">${totalFrames}</div>
          <div class="stat-label">Total Data Points</div>
        </div>
        <div class="stat-box">
          <div class="stat-value">${duration.toFixed(1)}s</div>
          <div class="stat-label">Duration</div>
        </div>
        <div class="stat-box verdict" style="grid-column: span 2;">
          <div class="stat-value">🏁 ${verdict}</div>
          <div class="stat-label">Overall Verdict</div>
        </div>
      `;
      document.getElementById("statsGrid").innerHTML = html;
    }

    /* ── Data table ── */
    function buildTable() {
      const tbody = document.getElementById("tableBody");
      let html = "";
      timeline.forEach((r, i) => {
        const s1cls = r.signal_1 === "RED" ? "red" : "green";
        const s2cls = r.signal_2 === "RED" ? "red" : "green";
        html += `<tr>
          <td>${i + 1}</td>
          <td>${Number(r.time_sec).toFixed(2)}</td>
          <td>${Number(r.density_1).toFixed(2)}</td>
          <td>${Number(r.density_2).toFixed(2)}</td>
          <td><span class="sig-badge ${s1cls}">${r.signal_1}</span></td>
          <td><span class="sig-badge ${s2cls}">${r.signal_2}</span></td>
        </tr>`;
      });
      tbody.innerHTML = html;
      document.getElementById("tableInfo").innerText = `Showing all ${timeline.length} rows`;
    }

    /* ── Chart ── */
    function drawChart() {
      const canvas = document.getElementById("chartCanvas");
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      const ctx = canvas.getContext("2d");
      ctx.scale(dpr, dpr);

      const W = rect.width, H = rect.height;
      const pad = { top: 20, right: 20, bottom: 40, left: 55 };
      const cw = W - pad.left - pad.right;
      const ch = H - pad.top - pad.bottom;

      if (!timeline.length) return;

      const times = timeline.map(r => r.time_sec);
      const d1 = timeline.map(r => r.density_1);
      const d2 = timeline.map(r => r.density_2);

      const tMin = times[0], tMax = times[times.length - 1];
      const dMax = Math.max(...d1, ...d2) * 1.15 || 1;

      const xScale = v => pad.left + ((v - tMin) / (tMax - tMin || 1)) * cw;
      const yScale = v => pad.top + ch - (v / dMax) * ch;

      // Background
      ctx.fillStyle = "#1a1d27";
      ctx.fillRect(0, 0, W, H);

      // Grid lines
      ctx.strokeStyle = "#2a2d3a";
      ctx.lineWidth = 1;
      const yTicks = 5;
      for (let i = 0; i <= yTicks; i++) {
        const v = (dMax / yTicks) * i;
        const y = yScale(v);
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(W - pad.right, y);
        ctx.stroke();

        ctx.fillStyle = "#6b7280";
        ctx.font = "11px Inter, sans-serif";
        ctx.textAlign = "right";
        ctx.fillText(v.toFixed(0), pad.left - 8, y + 4);
      }

      // X axis labels
      const xTicks = Math.min(10, timeline.length);
      ctx.textAlign = "center";
      for (let i = 0; i <= xTicks; i++) {
        const t = tMin + ((tMax - tMin) / xTicks) * i;
        const x = xScale(t);
        ctx.fillStyle = "#6b7280";
        ctx.fillText(t.toFixed(1) + "s", x, H - pad.bottom + 18);

        ctx.strokeStyle = "#2a2d3a";
        ctx.beginPath();
        ctx.moveTo(x, pad.top);
        ctx.lineTo(x, pad.top + ch);
        ctx.stroke();
      }

      // Line — Density 1
      ctx.strokeStyle = "#3b82f6";
      ctx.lineWidth = 2;
      ctx.beginPath();
      times.forEach((t, i) => {
        const x = xScale(t), y = yScale(d1[i]);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.stroke();

      // Fill under D1
      ctx.save();
      ctx.globalAlpha = 0.08;
      ctx.fillStyle = "#3b82f6";
      ctx.beginPath();
      times.forEach((t, i) => {
        const x = xScale(t), y = yScale(d1[i]);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.lineTo(xScale(tMax), yScale(0));
      ctx.lineTo(xScale(tMin), yScale(0));
      ctx.closePath();
      ctx.fill();
      ctx.restore();

      // Line — Density 2
      ctx.strokeStyle = "#a78bfa";
      ctx.lineWidth = 2;
      ctx.beginPath();
      times.forEach((t, i) => {
        const x = xScale(t), y = yScale(d2[i]);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.stroke();

      // Fill under D2
      ctx.save();
      ctx.globalAlpha = 0.08;
      ctx.fillStyle = "#a78bfa";
      ctx.beginPath();
      times.forEach((t, i) => {
        const x = xScale(t), y = yScale(d2[i]);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.lineTo(xScale(tMax), yScale(0));
      ctx.lineTo(xScale(tMin), yScale(0));
      ctx.closePath();
      ctx.fill();
      ctx.restore();

      // Legend
      const legY = 12;
      ctx.font = "bold 12px Inter, sans-serif";
      ctx.fillStyle = "#3b82f6";
      ctx.fillRect(pad.left + 8, legY - 6, 14, 3);
      ctx.fillText("Density V1", pad.left + 28, legY);

      ctx.fillStyle = "#a78bfa";
      ctx.fillRect(pad.left + 120, legY - 6, 14, 3);
      ctx.fillText("Density V2", pad.left + 140, legY);

      // Axis labels
      ctx.save();
      ctx.fillStyle = "#6b7280";
      ctx.font = "11px Inter, sans-serif";
      ctx.translate(14, pad.top + ch / 2);
      ctx.rotate(-Math.PI / 2);
      ctx.textAlign = "center";
      ctx.fillText("Density (veh/km)", 0, 0);
      ctx.restore();

      ctx.fillStyle = "#6b7280";
      ctx.font = "11px Inter, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("Time", W / 2, H - 4);
    }

    /* ── Signal playback ── */
    function startPlayback() {
      stopPlayback();
      playIndex = 0;
      isPlaying = true;
      document.getElementById("btnPlayPause").innerText = "⏸ Pause";
      tick();
    }

    function stopPlayback() {
      if (playTimer) clearInterval(playTimer);
      playTimer = null;
      isPlaying = false;
    }

    function tick() {
      const speed = parseInt(document.getElementById("playbackSpeed").value);
      if (playTimer) clearInterval(playTimer);
      playTimer = setInterval(() => {
        if (playIndex >= timeline.length) {
          stopPlayback();
          document.getElementById("btnPlayPause").innerText = "🔄 Replay";
          return;
        }
        showFrame(playIndex);
        playIndex++;
      }, speed);
    }

    function showFrame(idx) {
      const r = timeline[idx];
      const l1 = document.getElementById("l1");
      const l2 = document.getElementById("l2");

      l1.className = "light " + (r.signal_1 === "RED" ? "red" : "green");
      l2.className = "light " + (r.signal_2 === "RED" ? "red" : "green");

      document.getElementById("meta").innerText =
        `t=${Number(r.time_sec).toFixed(2)}s  |  d1=${Number(r.density_1).toFixed(2)}  |  d2=${Number(r.density_2).toFixed(2)}`;

      const pct = ((idx + 1) / timeline.length * 100).toFixed(1);
      document.getElementById("progressBar").style.width = pct + "%";
      document.getElementById("playbackTime").innerText = `${idx + 1} / ${timeline.length}`;
    }

    document.getElementById("btnPlayPause").onclick = () => {
      if (!timeline.length) return;
      if (isPlaying) {
        stopPlayback();
        document.getElementById("btnPlayPause").innerText = "▶ Play";
      } else {
        if (playIndex >= timeline.length) playIndex = 0;
        isPlaying = true;
        document.getElementById("btnPlayPause").innerText = "⏸ Pause";
        tick();
      }
    };

    document.getElementById("playbackSpeed").onchange = () => {
      if (isPlaying) tick();
    };

    // Redraw chart on resize
    window.addEventListener("resize", () => {
      if (timeline.length) drawChart();
    });
  </script>
</body>
</html>
